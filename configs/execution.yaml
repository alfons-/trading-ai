# Configuración de ejecución live / paper trading
# ────────────────────────────────────────────────
# Uso:
#   python -m scripts.run_live --config configs/execution.yaml
#   python -m scripts.run_live --config configs/execution.yaml --paper   # sin API, simulación local

# ── Conexión ──────────────────────────────────────
# testnet: true usa api-testnet.bybit.com (dinero ficticio)
# testnet: false usa api.bybit.com (dinero real — ¡cuidado!)
# API keys se leen de .env (BYBIT_API_KEY, BYBIT_API_SECRET)
testnet: false
bybit_category: "linear"
bybit_tld: "eu"              # "eu" para Bybit EU (España/Europa), "com" para global

# ── Símbolo y timeframes ─────────────────────────
symbol: BTCUSDT
timeframe_base: "4h"
exit_timeframe: "1D"       # TF para señales de salida (1D, 4h)

# ── Estrategia ────────────────────────────────────
# Tipo: "rsi_cross" | "xgboost"
# Modelos multi-régimen: entrenar con configs/regime_experiment.yaml
strategy: "xgboost"

# Parámetros RSI cross (solo si strategy == "rsi_cross")
rsi_cross:
  rsi_period: 14
  entry_cross_level: 32
  exit_cross_level: 50
  entry_touch_lookback_bars: 0

# Parámetros XGBoost (solo si strategy == "xgboost")
xgboost:
  model_path: "models/xgb_model.joblib"
  prob_buy_threshold: 0.55
  prob_sell_threshold: 0.45
  config_path: "configs/regime_experiment.yaml"
  multi_regime: true
  bull: { prob_buy_threshold: 0.55, prob_sell_threshold: 0.45 }
  bear: { prob_short_open_threshold: 0.55, prob_short_close_threshold: 0.45 }
  sideways: { prob_buy_threshold: 0.55, prob_sell_threshold: 0.45 }

# ── Gestión de riesgo ─────────────────────────────
risk:
  capital_per_trade_usdt: 20     # 20 USDT por operación (conservador con 100 USDT)
  capital_pct_per_trade: 0.0     # % del balance (0 = usar capital_per_trade_usdt)
  leverage: 1                    # apalancamiento (1 = sin apalancamiento)
  stop_loss_pct: 0.03            # -3% desde precio de entrada
  take_profit_pct: 0.10          # +10% desde precio de entrada
  max_open_positions: 1          # máximo de posiciones simultáneas
  # allow_long_and_short_same_symbol: false  # por defecto: cerrar la pierna opuesta antes de invertir
  max_daily_loss_usdt: 10        # si pierde 10 USDT en el día, el bot se detiene

# ── Loop de ejecución ─────────────────────────────
loop:
  check_interval_seconds: 300   # cada 5 min — suficiente para velas de 4h
  lookback_bars: 100             # velas históricas a cargar para indicadores
  # >= ~120 días en 4h para S/R lookback 360 + indicadores (train_recommended)
  history_days: 400
  log_interval_minutes: 15       # cada cuánto imprimir estado

# ── Paper trading local ───────────────────────────
paper:
  initial_balance_usdt: 10000
