# Config recomendada para entrenar XGBoost con la estrategia completa del proyecto:
# 4h + 1D/1W, MACD, S/R por toques, tres modelos por régimen (bull/bear/sideways).
#
# Uso:
#   Primera vez (refrescar CSV desde Bybit):
#     Pon force_refresh_data: true, ejecuta, luego vuelve a false.
#   python -m scripts.run_experiment --config configs/train_recommended.yaml --symbol BTCUSDT
#
# Modelos: models/xgb_{bull|bear|sideways}_<SYMBOL>.joblib
# En live: configs/execution.yaml → strategy: xgboost, xgboost.config_path apuntando aquí.

bybit_category: "linear"

symbols:
  - BTCUSDT

timeframe_base: "4h"
# ~5 años: buen compromiso calidad/tiempo (warm-up S/R 360 + indicadores largos)
history_days: 1825

# Tras una descarga completa con history_days alto, dejar en false
force_refresh_data: false

higher_timeframes:
  daily:
    timeframe: "1D"
    enabled: true
    sma_window: 20
  weekly:
    timeframe: "1W"
    enabled: true
    trend_sma_window: 20

features:
  sma_corta: 10
  sma_larga: 50
  rsi_window: 14
  volatility_window: 20
  return_lags: [1, 2, 3, 5]
  macd:
    enabled: true
    window_fast: 12
    window_slow: 26
    window_sign: 9
  support_resistance:
    enabled: true
    mode: touches
    lookback: 360
    daily_lookback: 62
    swing_order: 2
    daily_swing_order: 2
    touch_tolerance_pct: 0.002
    min_touches: 2
    fallback_minmax: true

target:
  horizon: 5
  threshold: 0.005

split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

xgboost:
  n_estimators: 200
  max_depth: 4
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  eval_metric: "logloss"
  early_stopping_rounds: 20
  # auto: neg/pos en train (cap 25). Número fijo si prefieres control manual.
  scale_pos_weight: auto

multi_regime: true

regimes:
  adx_trending_min: 20
  trend_column: weekly_trend
  adx_column: weekly_adx

regime_targets:
  range_threshold: 0.003

regime_models:
  path_template: "models/xgb_{regime}_{symbol}.joblib"
  min_samples: 400

regime_backtest:
  min_hold_bars: 0
  bull:
    prob_buy_threshold: 0.55
    prob_sell_threshold: 0.45
  bear:
    prob_short_open_threshold: 0.55
    prob_short_close_threshold: 0.45
  sideways:
    prob_buy_threshold: 0.55
    prob_sell_threshold: 0.45

backtest:
  prob_buy_threshold: 0.55
  prob_sell_threshold: 0.45
