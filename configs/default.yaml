# Configuración por defecto para experimentos XGBoost + Bybit
# ─────────────────────────────────────────────────────────────
# bybit_category: spot | linear — CSV en data/bybit/<category>/

bybit_category: "linear"

symbols:
  - BTCUSDT
  - ETHUSDT

# ── Timeframes ───────────────────────────────────────────────
# timeframe_base: TF principal para señales de entrada y modelo
# higher_timeframes: TFs superiores para contexto (tendencia, salida)
#   - Para cada símbolo, DataAgent descarga 3 CSV:
#     <symbol>_4h.csv, <symbol>_1D.csv, <symbol>_1W.csv
timeframe_base: "4h"
history_days: 5475       # días de histórico (aplica a todos los TFs)

higher_timeframes:
  daily:
    timeframe: "1D"      # TF para horizonte de salida
    enabled: true
    sma_window: 20       # SMA diaria para contexto
  weekly:
    timeframe: "1W"      # TF para filtro de tendencia de mercado
    enabled: true
    trend_sma_window: 20 # SMA semanal: cierre > sma → alcista

# Lista derivada de todos los TFs a descargar (base + higher)
# DataAgent los recorre: ["4h", "1D", "1W"]

# ── Features ──────────────────────────────────────────────────
features:
  sma_corta: 10
  sma_larga: 50
  rsi_window: 14
  volatility_window: 20
  return_lags: [1, 2, 3, 5]

# ── Target ────────────────────────────────────────────────────
target:
  horizon: 5            # predecir N barras hacia delante
  threshold: 0.005      # umbral para clasificar como subida (0.5 %)

# ── Train / Validation / Test split ──────────────────────────
split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

# ── XGBoost ───────────────────────────────────────────────────
xgboost:
  n_estimators: 200
  max_depth: 4
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  eval_metric: "logloss"
  early_stopping_rounds: 20

# ── Multi-régimen (tres XGB: bull / bear / sideways) ──────────
# Si multi_regime: true, se entrena un modelo por régimen y el backtest/live
# usan el modelo acorde a la vela actual.
multi_regime: false

regimes:
  adx_trending_min: 20
  trend_column: weekly_trend
  adx_column: weekly_adx

# Targets por régimen (horizon/threshold heredan de target:)
regime_targets:
  # Sideways: target=1 si abs(retorno_futuro) < range_threshold
  range_threshold: 0.003

regime_models:
  path_template: "models/xgb_{regime}_{symbol}.joblib"
  min_samples: 500

# Umbrales de backtest cuando multi_regime (long / short / sideways)
regime_backtest:
  min_hold_bars: 0
  bull:
    prob_buy_threshold: 0.55
    prob_sell_threshold: 0.45
  bear:
    prob_short_open_threshold: 0.55
    prob_short_close_threshold: 0.45
  sideways:
    prob_buy_threshold: 0.55
    prob_sell_threshold: 0.45

# ── Backtest ──────────────────────────────────────────────────
backtest:
  prob_buy_threshold: 0.55    # prob(subida) > esto → comprar
  prob_sell_threshold: 0.45   # prob(subida) < esto → vender/fuera
